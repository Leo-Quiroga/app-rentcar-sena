spring.application.name=autoreserve-backend

# =============================================================================
# CONFIGURACIÓN DE PRODUCCIÓN/DOCKER
# =============================================================================
# Esta configuración está pensada para Docker Compose donde 'mysql' es el service name
# Para desarrollo local, usa: --spring.profiles.active=dev
# Para tests, usa: --spring.profiles.active=test

# Base de datos MySQL para producción/Docker
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA para producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de vistas
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Logging para producción (menos verbose)
logging.level.com.autoreserve.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# JMX deshabilitado en producción por seguridad
spring.jmx.enabled=false