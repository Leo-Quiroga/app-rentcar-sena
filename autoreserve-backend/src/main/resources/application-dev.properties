spring.application.name=autoreserve-backend-dev

# Base de datos MySQL para desarrollo local
spring.datasource.url=jdbc:mysql://localhost:3306/autoreserve_app_bd?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA para desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de vistas JSP (si las usas)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Logging para desarrollo
logging.level.com.autoreserve.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# JMX habilitado para desarrollo
spring.jmx.enabled=true