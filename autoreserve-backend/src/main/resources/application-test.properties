spring.application.name=autoreserve-backend-test

# =============================================================================
# CONFIGURACIÓN DE TESTS - H2 DATABASE EN MEMORIA
# =============================================================================
# Esta configuración se usa automáticamente cuando se ejecutan tests
# Los tests no dependen de MySQL externo

# Base de datos H2 en memoria para tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración JPA para tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Configuración SQL para tests
spring.sql.init.enabled=false
spring.sql.init.mode=never

# Habilitar consola H2 para debugging (opcional)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Logging mínimo para tests
logging.level.com.autoreserve.backend=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.boot.autoconfigure=WARN

# Configuraciones para tests rápidos
spring.jmx.enabled=false
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp